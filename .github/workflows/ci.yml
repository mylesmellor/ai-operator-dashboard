name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Catch a retired/pinned Claude model before it breaks a live demo.
      # Skips gracefully (exit 0) if ANTHROPIC_API_KEY isn't configured;
      # fails the build only when a configured model returns 404 (retired).
      - run: npm run preflight:models
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
